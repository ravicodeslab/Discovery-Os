version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: discovery-os-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: discovery_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: discovery-os-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/discovery_os
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173", "http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:18-alpine
    container_name: discovery-os-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
